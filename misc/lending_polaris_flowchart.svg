<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1760" viewBox="0 0 2200 1760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="redArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#dc2626"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .lane-title { font: 700 18px Arial, sans-serif; fill: #334155; }
      .node-title { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .node-text { font: 13px Arial, sans-serif; fill: #334155; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .box { rx: 10; ry: 10; stroke-width: 2; }
      .decision { stroke-width: 2; }
      .edge { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .red-edge { fill: none; stroke: #dc2626; stroke-width: 2.2; stroke-dasharray: 8 6; marker-end: url(#redArrow); }
      .lane { rx: 14; ry: 14; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="2200" height="1760" fill="#ffffff"/>
  <text x="1100" y="48" text-anchor="middle" class="title">No-LOS Polaris Lending and BNPL Lifecycle Flow</text>

  <rect x="40" y="80" width="2120" height="180" class="lane" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="70" y="112" class="lane-title">1. Configuration and Onboarding</text>
  <rect x="90" y="135" width="310" height="88" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="245" y="160" text-anchor="middle" class="node-title">System Configuration</text>
  <text x="245" y="182" text-anchor="middle" class="node-text">Polaris product, transaction,</text>
  <text x="245" y="202" text-anchor="middle" class="node-text">dynamic field mappings</text>
  <rect x="500" y="135" width="340" height="88" class="box" fill="#ecfeff" stroke="#0891b2"/>
  <text x="670" y="160" text-anchor="middle" class="node-title">Merchant Onboarding</text>
  <text x="670" y="182" text-anchor="middle" class="node-text">merchant + terminal + passive account</text>
  <text x="670" y="202" text-anchor="middle" class="small">tmm/insertMerchant, tsd/createTsdTerminal</text>

  <rect x="40" y="290" width="2120" height="260" class="lane" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="70" y="322" class="lane-title">2. Customer Core Setup</text>
  <rect x="80" y="360" width="210" height="90" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="185" y="385" text-anchor="middle" class="node-title">Register + OTP</text>
  <text x="185" y="407" text-anchor="middle" class="node-text">users, profiles, sessions</text>
  <rect x="350" y="360" width="210" height="90" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="455" y="385" text-anchor="middle" class="node-title">DAN Authorize</text>
  <text x="455" y="407" text-anchor="middle" class="node-text">dan_verifications</text>
  <rect x="620" y="360" width="240" height="90" class="box" fill="#cffafe" stroke="#0891b2"/>
  <text x="740" y="385" text-anchor="middle" class="node-title">Polaris CIF</text>
  <text x="740" y="407" text-anchor="middle" class="node-text">cif/createPerson, updatePerson</text>
  <text x="740" y="427" text-anchor="middle" class="small">store custCode locally</text>
  <rect x="930" y="360" width="270" height="90" class="box" fill="#cffafe" stroke="#0891b2"/>
  <text x="1065" y="385" text-anchor="middle" class="node-title">Customer Deposit</text>
  <text x="1065" y="407" text-anchor="middle" class="node-text">casa/createAccount + open</text>
  <text x="1065" y="427" text-anchor="middle" class="small">store acntCode in accounts</text>
  <rect x="1270" y="360" width="230" height="90" class="box" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="1385" y="385" text-anchor="middle" class="node-title">KYC Sync</text>
  <text x="1385" y="407" text-anchor="middle" class="node-text">kyc_* + CIF dynamicData</text>
  <rect x="1570" y="360" width="240" height="90" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="1690" y="385" text-anchor="middle" class="node-title">Credit Scoring</text>
  <text x="1690" y="407" text-anchor="middle" class="node-text">FICO + custom score</text>
  <text x="1690" y="427" text-anchor="middle" class="small">sync risk fields to Polaris</text>
  <rect x="1870" y="360" width="210" height="90" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="1975" y="385" text-anchor="middle" class="node-title">Loan Limit</text>
  <text x="1975" y="407" text-anchor="middle" class="node-text">loan_limits active</text>

  <rect x="40" y="580" width="2120" height="340" class="lane" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="70" y="612" class="lane-title">3. Line, Application, Core Loan Setup</text>
  <rect x="80" y="665" width="260" height="90" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="210" y="690" text-anchor="middle" class="node-title">Polaris Line Account</text>
  <text x="210" y="712" text-anchor="middle" class="node-text">line/createAccount + open</text>
  <text x="210" y="732" text-anchor="middle" class="small">limit tied to deposit account</text>
  <path d="M460 710 L540 650 L620 710 L540 770 Z" class="decision" fill="#fff7ed" stroke="#ea580c"/>
  <text x="540" y="705" text-anchor="middle" class="node-title">Loan</text>
  <text x="540" y="725" text-anchor="middle" class="node-title">type?</text>
  <rect x="720" y="610" width="260" height="86" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="850" y="635" text-anchor="middle" class="node-title">One-Tap Application</text>
  <text x="850" y="657" text-anchor="middle" class="node-text">loan_applications</text>
  <rect x="720" y="735" width="260" height="86" class="box" fill="#ecfccb" stroke="#65a30d"/>
  <text x="850" y="760" text-anchor="middle" class="node-title">BNPL Invoice / QR</text>
  <text x="850" y="782" text-anchor="middle" class="node-text">POS invoice, QR, transaction</text>
  <rect x="1080" y="665" width="270" height="90" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1215" y="690" text-anchor="middle" class="node-title">Limit Reservation Lock</text>
  <text x="1215" y="712" text-anchor="middle" class="node-text">available = line - utilized - reserved</text>
  <text x="1215" y="732" text-anchor="middle" class="small">double-spend boundary</text>
  <path d="M1465 710 L1545 650 L1625 710 L1545 770 Z" class="decision" fill="#f8fafc" stroke="#475569"/>
  <text x="1545" y="705" text-anchor="middle" class="node-title">Approve?</text>
  <rect x="1740" y="610" width="250" height="86" class="box" fill="#fef2f2" stroke="#dc2626"/>
  <text x="1865" y="635" text-anchor="middle" class="node-title">Reject / Cancel</text>
  <text x="1865" y="657" text-anchor="middle" class="node-text">release reservation + audit</text>
  <rect x="1740" y="735" width="250" height="86" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="1865" y="760" text-anchor="middle" class="node-title">Contract / Core Setup</text>
  <text x="1865" y="782" text-anchor="middle" class="node-text">pending_core_setup</text>

  <rect x="40" y="950" width="2120" height="310" class="lane" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="70" y="982" class="lane-title">4. Polaris Child Loan, Schedule, Grant, BNPL Settlement</text>
  <rect x="90" y="1040" width="255" height="90" class="box" fill="#cffafe" stroke="#0891b2"/>
  <text x="218" y="1065" text-anchor="middle" class="node-title">Child Loan Account</text>
  <text x="218" y="1087" text-anchor="middle" class="node-text">loan/createAccount + openAccount</text>
  <rect x="430" y="1040" width="265" height="90" class="box" fill="#cffafe" stroke="#0891b2"/>
  <text x="563" y="1065" text-anchor="middle" class="node-title">Schedule</text>
  <text x="563" y="1087" text-anchor="middle" class="node-text">calculateNrsSchedule + createNrsSchedule</text>
  <rect x="780" y="1040" width="245" height="90" class="box" fill="#cffafe" stroke="#0891b2"/>
  <text x="903" y="1065" text-anchor="middle" class="node-title">Link To Line</text>
  <text x="903" y="1087" text-anchor="middle" class="node-text">line/linkLineAccountToLoan</text>
  <rect x="1110" y="1040" width="260" height="90" class="box" fill="#cffafe" stroke="#0891b2"/>
  <text x="1240" y="1065" text-anchor="middle" class="node-title">Grant Non-Cash</text>
  <text x="1240" y="1087" text-anchor="middle" class="node-text">loan/grantLoanNonCash</text>
  <text x="1240" y="1107" text-anchor="middle" class="small">loan -> customer deposit; save jrno</text>
  <path d="M1490 1085 L1570 1025 L1650 1085 L1570 1145 Z" class="decision" fill="#fff7ed" stroke="#ea580c"/>
  <text x="1570" y="1080" text-anchor="middle" class="node-title">BNPL?</text>
  <rect x="1760" y="1000" width="280" height="90" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="1900" y="1025" text-anchor="middle" class="node-title">One-Tap Active</text>
  <text x="1900" y="1047" text-anchor="middle" class="node-text">application disbursed</text>
  <text x="1900" y="1067" text-anchor="middle" class="small">reservation consumed</text>
  <rect x="1760" y="1135" width="280" height="90" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="1900" y="1160" text-anchor="middle" class="node-title">BNPL Merchant Transfer</text>
  <text x="1900" y="1182" text-anchor="middle" class="node-text">customer deposit -> merchant passive</text>
  <text x="1900" y="1202" text-anchor="middle" class="small">POS approved only after confirmed</text>

  <rect x="40" y="1290" width="2120" height="230" class="lane" fill="#f0fdf4" stroke="#86efac"/>
  <text x="70" y="1322" class="lane-title">5. Repayment and Closing</text>
  <rect x="90" y="1370" width="240" height="85" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="210" y="1395" text-anchor="middle" class="node-title">Repayment Invoice</text>
  <text x="210" y="1417" text-anchor="middle" class="node-text">QPay invoice</text>
  <rect x="410" y="1370" width="250" height="85" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="535" y="1395" text-anchor="middle" class="node-title">Callback Guard</text>
  <text x="535" y="1417" text-anchor="middle" class="node-text">unique qpay_payment_id</text>
  <rect x="740" y="1370" width="250" height="85" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="865" y="1395" text-anchor="middle" class="node-title">Inbound Money</text>
  <text x="865" y="1417" text-anchor="middle" class="node-text">bank/QPay -> customer deposit</text>
  <rect x="1070" y="1370" width="250" height="85" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="1195" y="1395" text-anchor="middle" class="node-title">Loan Payment</text>
  <text x="1195" y="1417" text-anchor="middle" class="node-text">customer deposit -> loan account</text>
  <rect x="1400" y="1370" width="250" height="85" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1525" y="1395" text-anchor="middle" class="node-title">Schedule Allocation</text>
  <text x="1525" y="1417" text-anchor="middle" class="node-text">lock schedule, no overpay</text>
  <path d="M1760 1412 L1840 1352 L1920 1412 L1840 1472 Z" class="decision" fill="#f8fafc" stroke="#475569"/>
  <text x="1840" y="1407" text-anchor="middle" class="node-title">Final?</text>
  <rect x="1980" y="1370" width="145" height="85" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="2052" y="1395" text-anchor="middle" class="node-title">Close</text>
  <text x="2052" y="1417" text-anchor="middle" class="small">close loan account</text>

  <rect x="40" y="1550" width="2120" height="170" class="lane" fill="#fff1f2" stroke="#fda4af"/>
  <text x="70" y="1582" class="lane-title">6. Failure, Reconciliation, Audit Controls</text>
  <rect x="120" y="1620" width="280" height="70" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="260" y="1644" text-anchor="middle" class="node-title">Polaris Timeout</text>
  <text x="260" y="1665" text-anchor="middle" class="node-text">status = pending_reconcile</text>
  <rect x="520" y="1620" width="310" height="70" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="675" y="1644" text-anchor="middle" class="node-title">Reconcile Before Retry</text>
  <text x="675" y="1665" text-anchor="middle" class="node-text">journals, statements, account details</text>
  <rect x="950" y="1620" width="310" height="70" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1105" y="1644" text-anchor="middle" class="node-title">Retry Same Key or Dead Letter</text>
  <text x="1105" y="1665" text-anchor="middle" class="node-text">never double grant or double reverse</text>
  <rect x="1380" y="1620" width="300" height="70" class="box" fill="#f8fafc" stroke="#64748b"/>
  <text x="1530" y="1644" text-anchor="middle" class="node-title">Ledger + Audit</text>
  <text x="1530" y="1665" text-anchor="middle" class="node-text">ledger_journals, audit_logs, API logs</text>
  <rect x="1800" y="1620" width="280" height="70" class="box" fill="#f8fafc" stroke="#64748b"/>
  <text x="1940" y="1644" text-anchor="middle" class="node-title">Daily Reconciliation</text>
  <text x="1940" y="1665" text-anchor="middle" class="node-text">v_polaris_reconciliation_worklist</text>

